<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* 芒聰聙芒聰聙 JAMS 毛聰聰矛聻聬矛聺赂 铆聠聽铆聛掳 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙 */
:root {
  /* AM Brand */
  --brand-50:  #FBF4EF;
  --brand-100: #FAEAE0;
  --brand-400: #F58C4B;
  --brand-500: #FF6D12;
  --brand-600: #DA5400;

  /* Gray */
  --gray-50:  #F1F2F3;
  --gray-100: #E6E8EA;
  --gray-200: #D5D8DC;
  --gray-300: #C2C6CD;
  --gray-400: #AFB5BE;
  --gray-500: #949BA8;
  --gray-600: #768091;
  --gray-700: #575F6C;
  --gray-800: #3E434B;
  --gray-900: #292C32;
  --gray-950: #1A1A1E;

  /* Blue */
  --blue-50:  #EFF5FD;
  --blue-500: #3B8CF6;
  --blue-600: #207CF4;

  /* Red */
  --red-50:  #FBF5F5;
  --red-500: #EF4343;

  /* Green */
  --green-50:  #EAFAF4;
  --green-500: #0DBC7C;

  /* Violet */
  --violet-50:  #F5F3FF;
  --violet-500: #8B5CF6;

  /* Semantic */
  --color-primary:       var(--brand-500);
  --color-primary-hover: var(--brand-600);
  --bg-base:    #FFFFFF;
  --bg-surface: var(--gray-50);
  --text-default: var(--gray-950);
  --border-default: var(--gray-200);

  /* Spacing */
  --space-4:  4px;
  --space-6:  6px;
  --space-8:  8px;
  --space-10: 10px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;

  /* Radius */
  --r-4:   4px;
  --r-6:   6px;
  --r-8:   8px;
  --r-999: 999px;

  /* Shadow */
  --shadow-default: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-list:    0 4px 16px rgba(0,0,0,.12);

  /* Typography */
  --font: 'Noto Sans KR', -apple-system, sans-serif;
}
